name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Показываем реальную структуру vendor
          echo "=== vendor dir ==="
          ls app/src/main/cpp/samp/vendor/ 2>/dev/null || echo "vendor not found"
          echo "=== RakNet dir ==="
          ls app/src/main/cpp/samp/vendor/RakNet/ 2>/dev/null || echo "RakNet not found"
          echo "=== voice_new dir ==="
          ls app/src/main/cpp/samp/voice_new/ 2>/dev/null || echo "voice_new not found"
          echo "=== Network.h line 79 ==="
          sed -n '70,90p' app/src/main/cpp/samp/voice_new/Network.h 2>/dev/null || echo "Network.h not found"
          echo "=== gui.cpp lines 78-85 ==="
          sed -n '78,85p' app/src/main/cpp/samp/gui/gui.cpp 2>/dev/null || echo "gui.cpp not found"

          # 2. Создаём playerTabList.h с полным набором методов UI виджета
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          cat > app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>

          class PlayerTabList {
          private:
              bool m_visible = false;
              float m_minW = 0, m_minH = 0;
              float m_maxW = 9999, m_maxH = 9999;
          public:
              PlayerTabList() {}
              ~PlayerTabList() {}
              void render() {}
              void toggle() { m_visible = !m_visible; }
              void show() { m_visible = true; }
              void hide() { m_visible = false; }
              bool visible() const { return m_visible; }
              bool isVisible() const { return m_visible; }
              void setVisible(bool v) { m_visible = v; }
              void addChild(void* child) {}
              void setMinSize(float w, float h) { m_minW = w; m_minH = h; }
              void setMaxSize(float w, float h) { m_maxW = w; m_maxH = h; }
              void setSize(float w, float h) {}
              void setPos(float x, float y) {}
              void update() {}
          };
          EOF

          # 3. Исправляем RGBA.h
          RGBA_DIR="app/src/main/cpp/samp/game"
          if [ -f "$RGBA_DIR/rgba.h" ] && [ ! -f "$RGBA_DIR/RGBA.h" ]; then
            cp "$RGBA_DIR/rgba.h" "$RGBA_DIR/RGBA.h"
          fi

          # 4. Исправляем INVALID_SOCKET в Network.h
          NETWORK_H="app/src/main/cpp/samp/voice_new/Network.h"
          if [ -f "$NETWORK_H" ]; then
            grep -q "INVALID_SOCKET" "$NETWORK_H" && \
            sed -i '1s/^/#ifndef INVALID_SOCKET\n#define INVALID_SOCKET (-1)\n#endif\n/' "$NETWORK_H"
          fi

          # 5. Замена IP
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'

          # 6. Замена порта (только точное число)
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          # 7. Замена названия в strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
