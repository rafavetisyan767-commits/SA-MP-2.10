name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Создаём playerTabList.h с полным классом
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          cat > app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>

          class PlayerTabList {
          public:
              PlayerTabList() {}
              ~PlayerTabList() {}
              void render() {}
              void toggle() {}
              void show() {}
              void hide() {}
              bool isVisible() const { return false; }
              void setVisible(bool v) {}
          };
          EOF

          # 2. Исправляем RGBA.h — создаём копию с заглавными буквами
          RGBA_DIR="app/src/main/cpp/samp/game"
          if [ -f "$RGBA_DIR/rgba.h" ] && [ ! -f "$RGBA_DIR/RGBA.h" ]; then
            cp "$RGBA_DIR/rgba.h" "$RGBA_DIR/RGBA.h"
          fi

          # 3. Замена IP
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'

          # 4. Замена порта (только точное число)
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          # 5. Замена названия в strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
