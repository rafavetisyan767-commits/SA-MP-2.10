name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Исправляем ошибку с отсутствующим файлом (создаем заглушку)
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          touch app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h
          
          # 2. Замена IP
          find . -type f -name "*.h" -o -name "*.cpp" | xargs sed -i 's/127.0.0.1/141.94.184.104/g'
          
          # 3. Замена порта
          find . -type f -name "*.h" -o -name "*.cpp" | xargs sed -i 's/7777/1341/g'
          
          # 4. Замена названия
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
