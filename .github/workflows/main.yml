name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create helper script
        run: |
          cat > /tmp/setup.py << 'EOF'
          import os, shutil

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content)

          write("app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h", """
          #pragma once
          #include <string>
          class PlayerTabList {
          private:
              bool m_visible = false;
              float m_minW=0,m_minH=0,m_maxW=9999,m_maxH=9999;
          public:
              PlayerTabList(){}
              ~PlayerTabList(){}
              void render(){}
              void toggle(){m_visible=!m_visible;}
              void show(){m_visible=true;}
              void hide(){m_visible=false;}
              bool visible() const {return m_visible;}
              bool isVisible() const {return m_visible;}
              void setVisible(bool v){m_visible=v;}
              void setMinSize(float w,float h){m_minW=w;m_minH=h;}
              void setMaxSize(float w,float h){m_maxW=w;m_maxH=h;}
              void setSize(float w,float h){}
              void setPos(float x,float y){}
              void update(){}
          };
          """)

          write("app/src/main/cpp/samp/vendor/RakNet/BitStream.h", """
          #pragma once
          #include <cstdint>
          #include <cstring>
          namespace RakNet {
              class BitStream {
              public:
                  BitStream(){}
                  BitStream(unsigned char* data,unsigned int len,bool copy){}
                  ~BitStream(){}
                  void Reset(){}
                  void Write(bool v){}
                  void Write(unsigned char v){}
                  void Write(int v){}
                  void Write(unsigned int v){}
                  void Write(float v){}
                  void Write(const char* v,int len){}
                  bool Read(bool &v){v=false;return false;}
                  bool Read(unsigned char &v){v=0;return false;}
                  bool Read(int &v){v=0;return false;}
                  bool Read(unsigned int &v){v=0;return false;}
                  bool Read(float &v){v=0.0f;return false;}
                  unsigned int GetNumberOfBitsUsed() const {return 0;}
                  unsigned int GetNumberOfBytesUsed() const {return 0;}
                  unsigned char* GetData() const {return nullptr;}
                  void SetWriteOffset(unsigned int o){}
                  void SetReadOffset(unsigned int o){}
                  unsigned int GetReadOffset() const {return 0;}
                  unsigned int GetWriteOffset() const {return 0;}
              };
          }
          """)

          write("app/src/main/cpp/samp/vendor/RakNet/RakClient.h", """
          #pragma once
          #include "BitStream.h"
          namespace RakNet {
              class RakClient {
              public:
                  RakClient(){}
                  ~RakClient(){}
                  bool Connect(const char* host,unsigned short port,unsigned short cp,unsigned int d,int t){return false;}
                  void Disconnect(unsigned int d){}
                  bool IsConnected() const {return false;}
                  bool Send(const BitStream* bs,int p,int r,char o){return false;}
                  bool Send(const char* d,int l,int p,int r,char o){return false;}
              };
          }
          """)

          write("app/src/main/cpp/samp/vendor/RakNet/RakNetTypes.h", """
          #pragma once
          #include <cstdint>
          namespace RakNet {
              typedef uint64_t RakNetGUID;
              typedef unsigned short SystemIndex;
              struct SystemAddress { const char* ToString() const {return "";} };
              struct Packet { unsigned char* data; unsigned int length; SystemAddress systemAddress; };
          }
          """)

          write("app/src/main/cpp/samp/vendor/RakNet/RakPeerInterface.h", """
          #pragma once
          #include "BitStream.h"
          #include "RakNetTypes.h"
          namespace RakNet {
              class RakPeerInterface {
              public:
                  static RakPeerInterface* GetInstance(){return nullptr;}
                  virtual ~RakPeerInterface(){}
              };
          }
          """)

          rgba = "app/src/main/cpp/samp/game/rgba.h"
          RGBA = "app/src/main/cpp/samp/game/RGBA.h"
          if os.path.exists(rgba) and not os.path.exists(RGBA):
              shutil.copy(rgba, RGBA)

          print("All files created!")
          EOF

      - name: Auto-Configure KTA Games
        run: |
          python3 /tmp/setup.py

          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
