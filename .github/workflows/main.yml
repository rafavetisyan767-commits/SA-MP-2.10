name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Принудительно инициализируем все submodules
          git submodule update --init --recursive --force 2>/dev/null || true

          # 2. Показываем что теперь есть в RakNet
          echo "=== RakNet files after submodule init ==="
          ls app/src/main/cpp/samp/vendor/RakNet/ 2>/dev/null || echo "RakNet still not found"

          # 3. Создаём playerTabList.h
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          cat > app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>

          class PlayerTabList {
          private:
              bool m_visible = false;
              float m_minW = 0, m_minH = 0;
              float m_maxW = 9999, m_maxH = 9999;
          public:
              PlayerTabList() {}
              ~PlayerTabList() {}
              void render() {}
              void toggle() { m_visible = !m_visible; }
              void show() { m_visible = true; }
              void hide() { m_visible = false; }
              bool visible() const { return m_visible; }
              bool isVisible() const { return m_visible; }
              void setVisible(bool v) { m_visible = v; }
              void setMinSize(float w, float h) { m_minW = w; m_minH = h; }
              void setMaxSize(float w, float h) { m_maxW = w; m_maxH = h; }
              void setSize(float w, float h) {}
              void setPos(float x, float y) {}
              void update() {}
          };
          EOF

          # 4. Создаём только недостающий RakClient.h (BitStream.h уже есть в репо)
          RAKNET_DIR="app/src/main/cpp/samp/vendor/RakNet"
          mkdir -p "$RAKNET_DIR"

          if [ ! -f "$RAKNET_DIR/RakClient.h" ]; then
            cat > "$RAKNET_DIR/RakClient.h" << 'EOF'
          #pragma once
          #include "BitStream.h"
          namespace RakNet {
              class RakClient {
              public:
                  RakClient() {}
                  ~RakClient() {}
                  bool Connect(const char* host, unsigned short port,
                               unsigned short clientPort,
                               unsigned int depreciated,
                               int threadSleepTimer) { return false; }
                  void Disconnect(unsigned int blockDuration) {}
                  bool IsConnected() const { return false; }
                  bool Send(const BitStream* bs, int priority,
                            int reliability, char orderingChannel) { return false; }
                  bool Send(const char* data, int length, int priority,
                            int reliability, char orderingChannel) { return false; }
              };
          }
          EOF
          fi

          # 5. Исправляем RGBA.h
          RGBA_DIR="app/src/main/cpp/samp/game"
          if [ -f "$RGBA_DIR/rgba.h" ] && [ ! -f "$RGBA_DIR/RGBA.h" ]; then
            cp "$RGBA_DIR/rgba.h" "$RGBA_DIR/RGBA.h"
          fi

          # 6. Замена IP
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'

          # 7. Замена порта (только точное число)
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          # 8. Замена названия в strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
