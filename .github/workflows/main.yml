name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Создаём playerTabList.h — visible как метод
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          cat > app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>

          class PlayerTabList {
          private:
              bool m_visible = false;
          public:
              PlayerTabList() {}
              ~PlayerTabList() {}
              void render() {}
              void toggle() { m_visible = !m_visible; }
              void show() { m_visible = true; }
              void hide() { m_visible = false; }
              bool visible() const { return m_visible; }
              bool isVisible() const { return m_visible; }
              void setVisible(bool v) { m_visible = v; }
          };
          EOF

          # 2. Исправляем RGBA.h
          RGBA_DIR="app/src/main/cpp/samp/game"
          if [ -f "$RGBA_DIR/rgba.h" ] && [ ! -f "$RGBA_DIR/RGBA.h" ]; then
            cp "$RGBA_DIR/rgba.h" "$RGBA_DIR/RGBA.h"
          fi

          # 3. Создаём весь RakNet с нуля (submodule не подтягивается)
          RAKNET_DIR="app/src/main/cpp/samp/vendor/RakNet"
          mkdir -p "$RAKNET_DIR"

          cat > "$RAKNET_DIR/BitStream.h" << 'EOF'
          #pragma once
          #include <cstdint>
          #include <cstring>
          #include <stdlib.h>
          namespace RakNet {
              class BitStream {
              public:
                  BitStream() {}
                  BitStream(unsigned char* data, unsigned int lengthInBytes, bool copyData) {}
                  ~BitStream() {}
                  void Reset() {}
                  void Write(bool val) {}
                  void Write(unsigned char val) {}
                  void Write(int val) {}
                  void Write(unsigned int val) {}
                  void Write(float val) {}
                  void Write(const char* val) {}
                  bool Read(bool &val) { return false; }
                  bool Read(unsigned char &val) { return false; }
                  bool Read(int &val) { return false; }
                  bool Read(unsigned int &val) { return false; }
                  bool Read(float &val) { return false; }
                  unsigned int GetNumberOfBitsUsed() const { return 0; }
                  unsigned int GetNumberOfBytesUsed() const { return 0; }
                  unsigned char* GetData() const { return nullptr; }
              };
          }
          EOF

          cat > "$RAKNET_DIR/RakClient.h" << 'EOF'
          #pragma once
          #include "BitStream.h"
          namespace RakNet {
              class RakClient {
              public:
                  RakClient() {}
                  ~RakClient() {}
                  bool Connect(const char* host, unsigned short port, unsigned short clientPort, unsigned int depreciated, int threadSleepTimer) { return false; }
                  void Disconnect(unsigned int blockDuration) {}
                  bool IsConnected() const { return false; }
                  bool Send(BitStream* bitStream, int priority, int reliability, char orderingChannel) { return false; }
                  bool Send(const char* data, const int length, int priority, int reliability, char orderingChannel) { return false; }
              };
          }
          EOF

          cat > "$RAKNET_DIR/RakPeerInterface.h" << 'EOF'
          #pragma once
          #include "BitStream.h"
          namespace RakNet {
              class RakPeerInterface {
              public:
                  RakPeerInterface() {}
                  virtual ~RakPeerInterface() {}
              };
          }
          EOF

          cat > "$RAKNET_DIR/NetworkIDObject.h" << 'EOF'
          #pragma once
          namespace RakNet {
              class NetworkIDObject {
              public:
                  NetworkIDObject() {}
                  virtual ~NetworkIDObject() {}
              };
          }
          EOF

          # 4. Замена IP
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'

          # 5. Замена порта (только точное число)
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          # 6. Замена названия в strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
