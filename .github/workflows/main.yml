name: Build_64bit_KTA_Games

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Configure KTA Games
        run: |
          # 1. Создаём playerTabList.h
          mkdir -p app/src/main/cpp/samp/gui/samp_widgets
          cat > app/src/main/cpp/samp/gui/samp_widgets/playerTabList.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>

          class PlayerTabList {
          private:
              bool m_visible = false;
              float m_minW = 0, m_minH = 0;
              float m_maxW = 9999, m_maxH = 9999;
          public:
              PlayerTabList() {}
              ~PlayerTabList() {}
              void render() {}
              void toggle() { m_visible = !m_visible; }
              void show() { m_visible = true; }
              void hide() { m_visible = false; }
              bool visible() const { return m_visible; }
              bool isVisible() const { return m_visible; }
              void setVisible(bool v) { m_visible = v; }
              void setMinSize(float w, float h) { m_minW = w; m_minH = h; }
              void setMaxSize(float w, float h) { m_maxW = w; m_maxH = h; }
              void setSize(float w, float h) {}
              void setPos(float x, float y) {}
              void update() {}
          };
          EOF

          # 2. Создаём RakNet/BitStream.h — папки нет в репо, создаём вручную
          mkdir -p app/src/main/cpp/samp/vendor/RakNet
          cat > app/src/main/cpp/samp/vendor/RakNet/BitStream.h << 'EOF'
          #pragma once
          #include <cstdint>
          #include <cstring>

          namespace RakNet {
              class BitStream {
              public:
                  BitStream() {}
                  BitStream(unsigned char* data, unsigned int lengthInBytes, bool copyData) {}
                  ~BitStream() {}
                  void Reset() {}
                  void Write(bool val) {}
                  void Write(unsigned char val) {}
                  void Write(int val) {}
                  void Write(unsigned int val) {}
                  void Write(float val) {}
                  void Write(const char* val, int len) {}
                  bool Read(bool &val) { val = false; return false; }
                  bool Read(unsigned char &val) { val = 0; return false; }
                  bool Read(int &val) { val = 0; return false; }
                  bool Read(unsigned int &val) { val = 0; return false; }
                  bool Read(float &val) { val = 0.0f; return false; }
                  unsigned int GetNumberOfBitsUsed() const { return 0; }
                  unsigned int GetNumberOfBytesUsed() const { return 0; }
                  unsigned char* GetData() const { return nullptr; }
                  void SetWriteOffset(unsigned int offset) {}
                  void SetReadOffset(unsigned int offset) {}
                  unsigned int GetReadOffset() const { return 0; }
                  unsigned int GetWriteOffset() const { return 0; }
              };
          }
          EOF

          # 3. Создаём остальные часто используемые RakNet заглушки
          cat > app/src/main/cpp/samp/vendor/RakNet/RakNetTypes.h << 'EOF'
          #pragma once
          #include <cstdint>
          namespace RakNet {
              typedef uint64_t RakNetGUID;
              typedef unsigned short SystemIndex;
              struct SystemAddress {
                  char ToString() const { return 0; }
              };
              struct Packet {
                  unsigned char* data;
                  unsigned int length;
                  SystemAddress systemAddress;
              };
          }
          EOF

          cat > app/src/main/cpp/samp/vendor/RakNet/RakPeerInterface.h << 'EOF'
          #pragma once
          #include "BitStream.h"
          #include "RakNetTypes.h"
          namespace RakNet {
              class RakPeerInterface {
              public:
                  static RakPeerInterface* GetInstance() { return nullptr; }
                  virtual ~RakPeerInterface() {}
              };
          }
          EOF

          # 4. Исправляем RGBA.h
          RGBA_DIR="app/src/main/cpp/samp/game"
          if [ -f "$RGBA_DIR/rgba.h" ] && [ ! -f "$RGBA_DIR/RGBA.h" ]; then
            cp "$RGBA_DIR/rgba.h" "$RGBA_DIR/RGBA.h"
          fi

          # 5. Замена IP
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/127\.0\.0\.1/141.94.184.104/g'

          # 6. Замена порта (только точное число)
          find . -type f \( -name "*.h" -o -name "*.cpp" \) | xargs sed -i 's/\b7777\b/1341/g'

          # 7. Замена названия в strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i 's/SA-MP/KTA Games/g' app/src/main/res/values/strings.xml
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTA_Games_64bit
          path: app/build/outputs/apk/debug/*.apk
